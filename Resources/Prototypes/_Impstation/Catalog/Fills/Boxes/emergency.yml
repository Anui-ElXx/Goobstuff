- type: entity
  parent: BoxSurvivalUngu
  id: BoxHugUngu
  name: box of hugs
  description: It's a box with basic internals inside. Smells like grass?
  suffix: Wheat
  components:
  - type: Sprite
    sprite: Objects/Storage/boxes.rsi
    layers:
    - state: box_hug
    - state: heart
  - type: Item
    heldPrefix: hug
  - type: StorageFill
    contents:
    - id: ClothingMaskBreath
    - id: EmergencyFunnyOxygenTankFilled
    - id: EmergencyMedipen
    - id: Flare
    - id: WheatBushel
    - id: DrinkWaterBottleFull
  - type: Tag
    tags:
    - BoxHug

