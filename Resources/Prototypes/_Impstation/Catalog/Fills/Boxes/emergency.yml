# Ungu
- type: entity
  parent: BoxCardboard
  id: BoxSurvivalUngu
  name: survival box
  description: It's a box with basic internals inside. Smells like grass?
  suffix: Wheat
  components:
  - type: StorageFill
    contents:
    - id: ClothingMaskBreath
    - id: EmergencyOxygenTankFilled
    - id: EmergencyMedipen
    - id: Flare
    - id: WheatBushel
    - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: emergencytank

